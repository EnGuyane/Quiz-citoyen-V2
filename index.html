<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Citoyenneté FR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🇫🇷 Examen Civique</h1>
            <div class="creator-badge" style="background:#009b3a; color:#ffff00; padding:10px; border-radius:10px; margin-bottom:20px; font-weight:bold; text-align:center; border:2px solid #ce1126;">
                🇬🇫 Made in Guyane Française by Eric
            </div>
        </header>

        <main id="quiz-container">
            <div id="welcome-screen" style="text-align:center; padding:20px;">
                <p>Préparez votre examen avec les 191 questions officielles.</p>
                <button id="start-btn" style="background:#000091; color:white; padding:15px 30px; border-radius:50px; border:none; font-weight:bold; cursor:pointer; margin-top:20px; font-size:1.1rem;">
                    DÉMARRER LE TEST
                </button>
            </div>

            <div id="quiz-content" class="hidden">
                <div class="progress-container"><div id="progress-bar"></div></div>
                <div id="question-card">
                    <span id="chapter-name"></span>
                    <h2 id="question-text"></h2>
                    <div id="options-container" class="options-grid"></div>
                </div>
                <div id="feedback" class="hidden"></div>
                <button id="next-btn" class="hidden">Question suivante</button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
